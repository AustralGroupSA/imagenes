<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ágora Group | Panel de Control de CDN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Animación suave para los gráficos de anillo */
        .chart-ring {
            transition: stroke-dashoffset 1.5s ease-out;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen justify-between bg-black text-slate-100 font-sans antialiased selection:bg-blue-500 selection:text-white">

    <main class="flex-grow flex flex-col items-center px-4 py-12 max-w-7xl mx-auto w-full">
        
        <header class="w-full text-center mb-16">
            <div class="mb-4">
                <img src="https://agoragroup.com.ar/assets/logos/logo-agora.png" alt="Ágora Group Logo" class="h-20 mx-auto object-contain drop-shadow-[0_0_20px_rgba(59,130,246,0.3)]" onerror="this.style.display='none'">
            </div>
            <h1 class="text-3xl md:text-4xl font-black tracking-tight bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-500 bg-clip-text text-transparent mb-2">
                Ágora Group
            </h1>
            <p class="text-slate-400 text-sm md:text-base font-light">
                Infraestructura de almacenamiento estático y optimización global.
            </p>
        </header>

        <section class="w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
            
            <div class="p-6 rounded-2xl bg-slate-900/40 border border-slate-900 backdrop-blur-sm flex flex-col justify-center items-center text-center h-48">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4">Estado del Nodo</span>
                <div class="flex items-center gap-3">
                    <span id="status-dot" class="w-3 h-3 rounded-full bg-slate-600 animate-pulse"></span>
                    <span id="status-text" class="text-xl font-semibold text-slate-400">Conectando...</span>
                </div>
            </div>

            <div class="p-6 rounded-2xl bg-slate-900/40 border border-slate-900 backdrop-blur-sm flex flex-col items-center justify-between h-48">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wider w-full text-left">Archivos</span>
                <div class="relative w-28 h-28 mt-2">
                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="40" fill="transparent" stroke="#1e293b" stroke-width="8" />
                        <circle id="chart-images" cx="50" cy="50" r="40" fill="transparent" stroke="#3b82f6" stroke-width="8" stroke-dasharray="251.2" stroke-dashoffset="251.2" stroke-linecap="round" class="chart-ring" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="metric-count" class="text-xl font-black text-blue-400 leading-none">--</span>
                        <span class="text-[10px] text-slate-500 mt-1">/ 5000</span>
                    </div>
                </div>
            </div>

            <div class="p-6 rounded-2xl bg-slate-900/40 border border-slate-900 backdrop-blur-sm flex flex-col items-center justify-between h-48">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wider w-full text-left">Almacenamiento</span>
                <div class="relative w-28 h-28 mt-2">
                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="40" fill="transparent" stroke="#1e293b" stroke-width="8" />
                        <circle id="chart-storage" cx="50" cy="50" r="40" fill="transparent" stroke="#818cf8" stroke-width="8" stroke-dasharray="251.2" stroke-dashoffset="251.2" stroke-linecap="round" class="chart-ring" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="metric-size" class="text-xl font-black text-indigo-400 leading-none">--</span>
                        <span class="text-[10px] text-slate-500 mt-1">/ 1024 MB</span>
                    </div>
                </div>
            </div>

            <div class="p-6 rounded-2xl bg-slate-900/40 border border-slate-900 backdrop-blur-sm flex flex-col justify-center items-center text-center h-48">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Peso Promedio</span>
                <span id="metric-avg" class="text-4xl font-black text-purple-400 mt-1">--</span>
                <span class="text-sm text-slate-500 mt-1">Kilobytes / Archivo</span>
            </div>

        </section>

    </main>

    <footer class="w-full text-center py-6 border-t border-slate-900 text-slate-600 text-xs tracking-wider">
        &copy; 2026 Ágora Group. Panel de Administración Privado.
    </footer>

    <script>
        // ==========================================
        // ⚠️ DATOS DE TU REPOSITORIO
        const GITHUB_USER = 'AustralGroupSA';
        const GITHUB_REPO = 'imagenes';
        // ==========================================

        const extensions = ['webp', 'jpg', 'jpeg', 'png', 'gif', 'svg', 'ico'];
        
        // Circunferencia del SVG (2 * Math.PI * r) donde r=40
        const CIRCUMFERENCE = 251.2;

        async function initDashboard() {
            // Elementos de texto
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            const metricCount = document.getElementById('metric-count');
            const metricSize = document.getElementById('metric-size');
            const metricAvg = document.getElementById('metric-avg');

            // Elementos SVG de los gráficos
            const chartImages = document.getElementById('chart-images');
            const chartStorage = document.getElementById('chart-storage');

            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
                if (!response.ok) throw new Error('Error de conexión con GitHub');
                
                const files = await response.json();
                
                // Filtrar solo las imágenes
                const images = files.filter(file => {
                    const ext = file.name.split('.').pop().toLowerCase();
                    return file.type === 'file' && extensions.includes(ext) && file.name !== 'logo.webp';
                });

                // 1. ESTADO
                statusDot.className = "w-3 h-3 rounded-full bg-emerald-400 shadow-[0_0_12px_#34d399]";
                statusText.innerText = "Online";
                statusText.className = "text-xl font-semibold text-emerald-400";

                // Si no hay imágenes, mostrar 0 y salir
                if (images.length === 0) {
                    metricCount.innerText = "0";
                    metricSize.innerText = "0.00";
                    metricAvg.innerText = "0.00";
                    return;
                }

                // 2. CÁLCULOS MATEMÁTICOS
                let totalBytes = 0;
                images.forEach(img => totalBytes += img.size);

                const totalMB = (totalBytes / (1024 * 1024)).toFixed(2);
                const avgKB = ((totalBytes / 1024) / images.length).toFixed(1);

                // 3. ACTUALIZAR TEXTOS
                metricCount.innerText = images.length;
                metricSize.innerText = totalMB;
                metricAvg.innerText = avgKB;

                // 4. ANIMAR GRÁFICOS (Matemática de porcentajes)
                
                // Porcentaje de Imágenes (Límite 5000)
                const imgPercentage = Math.min(images.length / 5000, 1); // Evita que pase del 100%
                const imgOffset = CIRCUMFERENCE - (imgPercentage * CIRCUMFERENCE);
                
                // Porcentaje de Almacenamiento (Límite 1024 MB)
                const storagePercentage = Math.min(totalMB / 1024, 1);
                const storageOffset = CIRCUMFERENCE - (storagePercentage * CIRCUMFERENCE);

                // Aplicar el offset a los SVG para crear el efecto de "llenado"
                setTimeout(() => {
                    chartImages.style.strokeDashoffset = imgOffset;
                    chartStorage.style.strokeDashoffset = storageOffset;
                }, 100); // Pequeño delay para que la animación se aprecie al cargar

            } catch (error) {
                console.error(error);
                statusDot.className = "w-3 h-3 rounded-full bg-red-500 shadow-[0_0_12px_#ef4444]";
                statusText.innerText = "Offline";
                statusText.className = "text-xl font-semibold text-red-400";
                
                metricCount.innerText = "ERR";
                metricSize.innerText = "ERR";
                metricAvg.innerText = "ERR";
            }
        }

        // Ejecutar al cargar la web
        initDashboard();
    </script>
</body>
</html>
