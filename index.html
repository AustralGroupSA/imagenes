<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ágora Group | Panel de Control de CDN</title>
    
    <link rel="icon" type="image/jpg" href="https://cdn.agoragroup.com.ar/favicon.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Animación suave para los gráficos de anillo */
        .chart-ring {
            transition: stroke-dashoffset 1.5s ease-out, stroke 0.5s ease-out;
        }
    </style>
    <script>
    // ==========================================
    // 🔒 SISTEMA DE SEGURIDAD BÁSICO
    // ==========================================
    const claveCorrecta = "agora2026"; // <-- CAMBIA ESTA CONTRASEÑA
    
    // Preguntar la clave al usuario
    const intento = prompt("🔒 Acceso Restringido - Ágora Group\n\nPor favor, ingrese la contraseña de administrador:");
    
    // Si cancela o la clave es incorrecta, borramos toda la página
    if (intento !== claveCorrecta) {
        document.documentElement.innerHTML = `
            <body style='background-color: #000; color: #ef4444; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; margin: 0;'>
                <div style='text-align: center;'>
                    <h1 style='font-size: 2rem; margin-bottom: 0.5rem;'>Acceso Denegado</h1>
                    <p style='color: #64748b; font-size: 0.875rem;'>No tienes los permisos necesarios para ver esta infraestructura.</p>
                </div>
            </body>
        `;
        window.stop(); // Detiene la carga de cualquier otro script
    }
</script>
</head>
<body class="flex flex-col min-h-screen justify-between bg-black text-slate-100 font-sans antialiased selection:bg-blue-500 selection:text-white">

    <main class="flex-grow flex flex-col items-center px-4 py-12 max-w-7xl mx-auto w-full">
        
        <header class="w-full text-center mb-16 relative">
            <div class="mb-4">
                <img src="https://agoragroup.com.ar/assets/logos/logo-agora.png" alt="Ágora Group Logo" class="h-20 mx-auto object-contain drop-shadow-[0_0_20px_rgba(59,130,246,0.3)]" onerror="this.style.display='none'">
            </div>
          
            <p class="text-slate-400 text-sm md:text-base font-light mb-2">
                Infraestructura de almacenamiento estático y optimización global.
            </p>
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-slate-900/50 border border-slate-800 text-[10px] text-slate-400">
                <i class="fa-solid fa-clock-rotate-left"></i> Sincronizado: <span id="sync-time">Calculando...</span>
            </div>
        </header>

        <section class="w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
            
            <div class="p-6 rounded-2xl bg-slate-900/40 border border-slate-900 backdrop-blur-sm flex flex-col justify-center items-center text-center h-48 relative overflow-hidden group">
                <div class="absolute inset-0 bg-gradient-to-br from-emerald-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-4 relative z-10">Estado del Nodo</span>
                <div class="flex items-center gap-3 relative z-10">
                    <span id="status-dot" class="w-3 h-3 rounded-full bg-slate-600 animate-pulse"></span>
                    <span id="status-text" class="text-xl font-semibold text-slate-400">Conectando...</span>
                </div>
            </div>

            <div class="p-6 rounded-2xl bg-slate-900/40 border border-slate-900 backdrop-blur-sm flex flex-col items-center justify-between h-48">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wider w-full text-left">Archivos</span>
                <div class="relative w-28 h-28 mt-2">
                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="40" fill="transparent" stroke="#1e293b" stroke-width="8" />
                        <circle id="chart-images" cx="50" cy="50" r="40" fill="transparent" stroke="#3b82f6" stroke-width="8" stroke-dasharray="251.2" stroke-dashoffset="251.2" stroke-linecap="round" class="chart-ring" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="metric-count" class="text-xl font-black text-slate-200 leading-none">--</span>
                        <span class="text-[10px] text-slate-500 mt-1">/ 5000</span>
                    </div>
                </div>
            </div>

            <div id="storage-card" class="p-6 rounded-2xl bg-slate-900/40 border border-slate-900 backdrop-blur-sm flex flex-col items-center justify-between h-48 cursor-help transition-colors hover:border-slate-800" title="Calculando bytes exactos...">
                <div class="w-full flex justify-between items-center text-left">
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Almacenamiento</span>
                    <i class="fa-solid fa-circle-info text-slate-600 text-xs"></i>
                </div>
                <div class="relative w-28 h-28 mt-2">
                    <svg class="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="40" fill="transparent" stroke="#1e293b" stroke-width="8" />
                        <circle id="chart-storage" cx="50" cy="50" r="40" fill="transparent" stroke="#818cf8" stroke-width="8" stroke-dasharray="251.2" stroke-dashoffset="251.2" stroke-linecap="round" class="chart-ring" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="metric-size" class="text-xl font-black text-slate-200 leading-none">--</span>
                        <span class="text-[10px] text-slate-500 mt-1">/ 1024 MB</span>
                    </div>
                </div>
            </div>

            <div class="p-6 rounded-2xl bg-slate-900/40 border border-slate-900 backdrop-blur-sm flex flex-col justify-center items-center text-center h-48">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Peso Promedio</span>
                <span id="metric-avg" class="text-4xl font-black text-purple-400 mt-1">--</span>
                <span class="text-sm text-slate-500 mt-1">Kilobytes / Archivo</span>
            </div>

        </section>

        <section class="w-full grid grid-cols-1 lg:grid-cols-2 gap-6 mb-12">
            
            <div class="p-6 rounded-2xl bg-slate-900/40 border border-slate-900 backdrop-blur-sm flex flex-col h-full">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wider w-full text-left mb-6">
                    <i class="fa-solid fa-chart-simple text-blue-400 mr-2"></i>Distribución de Formatos
                </span>
                <div id="format-bars" class="flex flex-col gap-4 flex-grow justify-center">
                    <div class="text-center text-slate-600 text-sm py-4"><i class="fa-solid fa-spinner animate-spin"></i> Analizando extensiones...</div>
                </div>
            </div>

            <div class="p-6 rounded-2xl bg-slate-900/40 border border-slate-900 backdrop-blur-sm flex flex-col h-full">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wider w-full text-left mb-6">
                    <i class="fa-solid fa-weight-hanging text-indigo-400 mr-2"></i>Requieren Optimización (Top 3)
                </span>
                <div id="top-files" class="flex flex-col gap-3 flex-grow justify-center">
                    <div class="text-center text-slate-600 text-sm
