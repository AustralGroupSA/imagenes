<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ágora Group | CDN de Imágenes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="flex flex-col min-h-screen justify-between bg-slate-950 text-slate-100 font-sans antialiased selection:bg-blue-500 selection:text-white">

    <main class="flex-grow flex flex-col items-center px-4 py-16 text-center">
        
        <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-500/10 text-emerald-400 text-xs font-medium border border-emerald-500/20 mb-8 animate-pulse">
            <span class="w-2 h-2 rounded-full bg-emerald-400"></span>
            Servidor Activo & Optimizado
        </div>

        <div class="mb-6">
            <img src="https://agoragroup.com.ar/assets/logos/logo-agora.png" alt="Austral Group Logo" class="h-24 mx-auto object-contain drop-shadow-[0_0_25px_rgba(59,130,246,0.4)]" onerror="this.style.display='none'">
        </div>

        <h1 class="text-4xl md:text-5xl font-black tracking-tight bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-500 bg-clip-text text-transparent mb-4">
            Austral Group
        </h1>
        
        <p class="text-slate-400 text-base md:text-lg max-w-md mx-auto mb-12 font-light">
            Almacenamiento y distribución global de archivos visuales de alta velocidad.
        </p>

        <section class="max-w-6xl w-full mt-4 border-t border-slate-900 pt-12">
            <h2 class="text-xl font-bold tracking-wide uppercase text-slate-400 mb-8 flex items-center justify-center gap-2">
                <i class="fa-solid fa-images text-blue-400"></i> Galería de Archivos
            </h2>

            <div id="loading-state" class="text-slate-500 py-12">
                <i class="fa-solid fa-circle-notch animate-spin text-2xl text-blue-500 mb-2"></i>
                <p class="text-sm">Conectando con el repositorio...</p>
            </div>

            <div id="gallery-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6 w-full text-left hidden">
                </div>
        </section>

    </main>

    <footer class="w-full text-center py-6 border-t border-slate-900 text-slate-600 text-xs tracking-wider">
        &copy; 2026 Ágora Group. Infraestructura Privada.
    </footer>

    <script>
        // ==========================================
        // ⚠️ REEMPLAZA ESTOS DOS DATOS CON LOS TUYOS:
        const GITHUB_USER = 'AustralGroupSA';
        const GITHUB_REPO = 'imagenes';
        // ==========================================

        const baseUrl = window.location.origin;
        const extensions = ['webp', 'jpg', 'jpeg', 'png', 'gif', 'svg', 'ico'];

        async function fetchImages() {
            const grid = document.getElementById('gallery-grid');
            const loading = document.getElementById('loading-state');

            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
                if (!response.ok) throw new Error('No se pudo leer el repositorio');
                
                const files = await response.json();
                
                // Filtrar solo archivos que sean imágenes y excluir el logo
                const images = files.filter(file => {
                    const ext = file.name.split('.').pop().toLowerCase();
                    return file.type === 'file' && extensions.includes(ext) && file.name !== 'logo.webp';
                });

                if (images.length === 0) {
                    loading.innerHTML = `<p class="text-slate-500 text-sm">El servidor está activo pero aún no hay imágenes subidas.</p>`;
                    return;
                }

                loading.classList.add('hidden');
                grid.classList.remove('hidden');

                images.forEach(img => {
                    const imageUrl = `${baseUrl}/${img.name}`;
                    const card = document.createElement('div');
                    card.className = "group relative rounded-2xl bg-slate-900/40 border border-slate-900 overflow-hidden hover:border-slate-800 transition-all duration-300 flex flex-col justify-between";
                    
                    card.innerHTML = `
                        <div class="aspect-square w-full bg-slate-950 flex items-center justify-center overflow-hidden border-b border-slate-900/60">
                            <img src="${imageUrl}" alt="${img.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy">
                        </div>
                        <div class="p-3 bg-slate-900/20 backdrop-blur-sm flex items-center justify-between gap-2">
                            <span class="text-xs text-slate-400 truncate font-mono" title="${img.name}">${img.name}</span>
                            <button onclick="copyToClipboard('${imageUrl}', this)" class="p-2 rounded-lg bg-slate-800 hover:bg-blue-600 text-slate-300 hover:text-white transition-colors duration-200 shrink-0 text-xs" title="Copiar URL directa">
                                <i class="fa-regular fa-copy"></i>
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                loading.innerHTML = `
                    <p class="text-red-400 text-sm"><i class="fa-solid fa-triangle-exclamation mr-1"></i> Error al cargar los archivos.</p>
                    <p class="text-xs text-slate-600 mt-1">Verifica tu usuario y repositorio en el código del index.html</p>
                `;
            }
        }

        // Función para copiar enlaces al portapapeles
        function copyToClipboard(text, button) {
            navigator.clipboard.writeText(text).then(() => {
                const icon = button.querySelector('i');
                // Cambiar a icono de check verde temporalmente
                icon.className = 'fa-solid fa-check text-emerald-400';
                button.classList.add('bg-emerald-500/10');
                
                setTimeout(() => {
                    icon.className = 'fa-regular fa-copy';
                    button.classList.remove('bg-emerald-500/10');
                }, 2000);
            }).catch(err => {
                alert('No se pudo copiar el enlace automáticamente');
            });
        }

        // Iniciar carga
        fetchImages();
    </script>
</body>
</html>
