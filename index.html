<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ágora Group | Panel de Control de CDN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="flex flex-col min-h-screen justify-between bg-black text-slate-100 font-sans antialiased selection:bg-blue-500 selection:text-white">

    <main class="flex-grow flex flex-col items-center px-4 py-12 max-w-7xl mx-auto w-full">
        
        <header class="w-full text-center mb-12">
            <div class="mb-4">
                <img src="https://agoragroup.com.ar/assets/logos/logo-agora.png" alt="Austral Group Logo" class="h-20 mx-auto object-contain drop-shadow-[0_0_20px_rgba(59,130,246,0.3)]" onerror="this.style.display='none'">
            </div>
          
            <p class="text-slate-400 text-sm md:text-base font-light">
                Infraestructura de almacenamiento estático y optimización global.
            </p>
        </header>

        <section class="w-full grid grid-cols-2 lg:grid-cols-4 gap-4 mb-12">
            
            <div class="p-4 md:p-6 rounded-2xl bg-slate-900/40 border border-slate-900 backdrop-blur-sm flex flex-col justify-between">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Estado</span>
                <div class="flex items-center gap-2 mt-2">
                    <span id="status-dot" class="w-2.5 h-2.5 rounded-full bg-slate-600 animate-pulse"></span>
                    <span id="status-text" class="text-base md:text-lg font-semibold text-slate-400">Verificando...</span>
                </div>
            </div>

            <div class="p-4 md:p-6 rounded-2xl bg-slate-900/40 border border-slate-900 backdrop-blur-sm flex flex-col justify-between">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Imágenes</span>
                <span id="metric-count" class="text-2xl md:text-3xl font-black text-blue-400 mt-1">--</span>
            </div>

            <div class="p-4 md:p-6 rounded-2xl bg-slate-900/40 border border-slate-900 backdrop-blur-sm flex flex-col justify-between">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Almacenamiento</span>
                <span id="metric-size" class="text-2xl md:text-3xl font-black text-indigo-400 mt-1">-- MB</span>
            </div>

            <div class="p-4 md:p-6 rounded-2xl bg-slate-900/40 border border-slate-900 backdrop-blur-sm flex flex-col justify-between">
                <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">Promedio / Archivo</span>
                <span id="metric-avg" class="text-2xl md:text-3xl font-black text-purple-400 mt-1">-- KB</span>
            </div>

        </section>

        <section class="w-full border-t border-slate-900 pt-8">
            <h2 class="text-lg font-bold tracking-wider uppercase text-slate-400 mb-6 flex items-center gap-2">
                <i class="fa-solid fa-grid-2 text-blue-400"></i> Explorador de Archivos
            </h2>

            <div id="loading-state" class="text-slate-500 text-center py-16">
                <i class="fa-solid fa-circle-notch animate-spin text-2xl text-blue-500 mb-2"></i>
                <p class="text-sm">Analizando datos del servidor...</p>
            </div>

            <div id="gallery-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 w-full text-left hidden">
                </div>
        </section>

    </main>

    <footer class="w-full text-center py-6 border-t border-slate-900 text-slate-600 text-xs tracking-wider">
        &copy; 2026 Ágora Group. Panel de Administración Privado.
    </footer>

    <script>
        // ==========================================
        // ⚠️ REEMPLAZA ESTOS DOS DATOS CON LOS TUYOS:
        const GITHUB_USER = 'TU_USUARIO_DE_GITHUB';
        const GITHUB_REPO = 'NOMBRE_DE_TU_REPOSITORIO';
        // ==========================================

        const baseUrl = window.location.origin;
        const extensions = ['webp', 'jpg', 'jpeg', 'png', 'gif', 'svg', 'ico'];

        async function initDashboard() {
            const grid = document.getElementById('gallery-grid');
            const loading = document.getElementById('loading-state');
            
            // Elementos de métricas
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            const metricCount = document.getElementById('metric-count');
            const metricSize = document.getElementById('metric-size');
            const metricAvg = document.getElementById('metric-avg');

            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/`);
                if (!response.ok) throw new Error('Error de conexión');
                
                const files = await response.json();
                
                // Filtrar solo las imágenes (excluyendo el logo principal)
                const images = files.filter(file => {
                    const ext = file.name.split('.').pop().toLowerCase();
                    return file.type === 'file' && extensions.includes(ext) && file.name !== 'logo.webp';
                });

                // Actualizar estado del servidor a Activo
                statusDot.className = "w-2.5 h-2.5 rounded-full bg-emerald-400 shadow-[0_0_8px_#34d399]";
                statusText.innerText = "Online";
                statusText.className = "text-base md:text-lg font-semibold text-emerald-400";

                if (images.length === 0) {
                    loading.innerHTML = `<p class="text-slate-500 text-sm">Servidor en línea. No se encontraron imágenes en la raíz.</p>`;
                    metricCount.innerText = "0";
                    metricSize.innerText = "0.00 MB";
                    metricAvg.innerText = "0.00 KB";
                    return;
                }

                // Cálculo de almacenamiento y promedios
                let totalBytes = 0;
                images.forEach(img => totalBytes += img.size);

                const totalMB = (totalBytes / (1024 * 1024)).toFixed(2);
                const avgKB = ((totalBytes / 1024) / images.length).toFixed(1);

                // Asignar métricas al panel
                metricCount.innerText = images.length;
                metricSize.innerText = `${totalMB} MB`;
                metricAvg.innerText = `${avgKB} KB`;

                // Ocultar carga y mostrar grilla
                loading.classList.add('hidden');
                grid.classList.remove('hidden');

                // Renderizar las imágenes en la grilla
                images.forEach(img => {
                    const imageUrl = `${baseUrl}/${img.name}`;
                    const card = document.createElement('div');
                    
                    // Diseño premium para cada celda de la grilla
                    card.className = "group relative rounded-xl bg-slate-900/30 border border-slate-900 overflow-hidden hover:border-slate-800 transition-all duration-300 flex flex-col aspect-square";
                    
                    card.innerHTML = `
                        <div class="w-full h-full bg-black/60 flex items-center justify-center p-2 overflow-hidden">
                            <img src="${imageUrl}" alt="${img.name}" class="max-w-full max-h-full object-contain group-hover:scale-105 transition-transform duration-500" loading="lazy">
                        </div>
                        <div class="absolute inset-x-0 bottom-0 p-2 bg-gradient-to-t from-black via-black/90 to-transparent pt-6 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-between gap-2">
                            <span class="text-[10px] text-slate-300 truncate font-mono w-full" title="${img.name}">${img.name}</span>
                            <button onclick="copyToClipboard('${imageUrl}', this)" class="p-1.5 rounded-md bg-slate-900 border border-slate-800 text-slate-400 hover:text-white hover:bg-blue-600 hover:border-blue-500 transition-all duration-200 shrink-0 text-[10px]" title="Copiar URL">
                                <i class="fa-regular fa-copy"></i>
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                statusDot.className = "w-2.5 h-2.5 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444]";
                statusText.innerText = "Error";
                statusText.className = "text-base md:text-lg font-semibold text-red-400";
                loading.innerHTML = `
                    <p class="text-red-400 text-sm"><i class="fa-solid fa-triangle-exclamation mr-1"></i> Error al sincronizar componentes.</p>
                    <p class="text-xs text-slate-600 mt-1">Asegúrate de configurar correctamente tu usuario y repositorio en las líneas 63-64.</p>
                `;
            }
        }

        // Portapapeles dinámico
        function copyToClipboard(text, button) {
            navigator.clipboard.writeText(text).then(() => {
                const icon = button.querySelector('i');
                icon.className = 'fa-solid fa-check text-emerald-400';
                button.classList.add('border-emerald-500/30');
                
                setTimeout(() => {
                    icon.className = 'fa-regular fa-copy';
                    button.classList.remove('border-emerald-500/30');
                }, 1500);
            });
        }

        // Ejecutar al cargar la web
        initDashboard();
    </script>
</body>
</html>
